<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Voice Analyzer — BrandieBuilds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        parchment: '#F5F0E8',
                        linen: '#EDE8DE',
                        sage: '#7A9E87',
                        'sage-dark': '#5f836e',
                        rust: '#C4503A',
                        'rust-dark': '#a33f2b',
                        ink: '#2C2C2C',
                        sand: '#D4C5A9',
                        'sand-light': '#EDE8DE',
                    },
                    fontFamily: {
                        display: ['"Playfair Display"', 'Georgia', 'serif'],
                        body: ['"DM Sans"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background-color: #F5F0E8;
            color: #2C2C2C;
        }
        textarea, input, select, button {
            font-family: 'DM Sans', system-ui, sans-serif;
        }
        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: #7A9E87 !important;
            box-shadow: 0 0 0 3px rgba(122, 158, 135, 0.15);
        }
        .tab-active {
            background-color: #2C2C2C;
            color: #F5F0E8;
        }
        .tab-inactive {
            background-color: transparent;
            color: #2C2C2C;
        }
        .tab-inactive:hover {
            background-color: #EDE8DE;
        }
        .bb-card {
            background: #FFFFFF;
            border: 1px solid #D4C5A9;
            border-radius: 8px;
        }
        .bb-btn-primary {
            background-color: #7A9E87;
            color: #FFFFFF;
            border: none;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }
        .bb-btn-primary:hover:not(:disabled) {
            background-color: #5f836e;
        }
        .bb-btn-primary:disabled {
            background-color: #D4C5A9;
            cursor: not-allowed;
        }
        .bb-btn-rust {
            background-color: #C4503A;
            color: #FFFFFF;
            border: none;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }
        .bb-btn-rust:hover:not(:disabled) {
            background-color: #a33f2b;
        }
        .bb-btn-rust:disabled {
            background-color: #D4C5A9;
            cursor: not-allowed;
        }
        .bb-btn-ghost {
            background-color: #EDE8DE;
            color: #2C2C2C;
            border: 1px solid #D4C5A9;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }
        .bb-btn-ghost:hover {
            background-color: #D4C5A9;
        }
        .bb-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #D4C5A9;
            border-radius: 6px;
            background-color: #FDFAF5;
            color: #2C2C2C;
            font-size: 0.9375rem;
            resize: none;
        }
        .bb-input::placeholder {
            color: #b0a898;
        }
        .criteria-item {
            border-left: 3px solid #7A9E87;
            padding-left: 12px;
            padding-top: 4px;
            padding-bottom: 4px;
            margin-bottom: 10px;
        }
        .sample-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 9px 12px;
            margin-bottom: 6px;
            background: #F5F0E8;
            border: 1px solid #D4C5A9;
            border-radius: 5px;
            font-size: 0.875rem;
            color: #2C2C2C;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .sample-btn:hover {
            background: #EDE8DE;
            border-color: #7A9E87;
        }
        .score-divider {
            border-bottom: 1px solid #EDE8DE;
            padding-bottom: 1.25rem;
            margin-bottom: 0;
        }
        .loading-dot {
            display: inline-block;
            animation: pulse 1.4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        /* Mobile responsive improvements */
        @media (max-width: 640px) {
            .mode-tabs { flex-direction: column; }
            .mode-tabs button { text-align: left; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        function BrandVoiceAnalyzer() {
            const [mode, setMode] = useState('analyze');
            const [content, setContent] = useState('');
            const [beforeContent, setBeforeContent] = useState('');
            const [afterContent, setAfterContent] = useState('');
            const [trainingExamples, setTrainingExamples] = useState(['', '', '']);
            const [uploadedGuidelines, setUploadedGuidelines] = useState(null);
            const [analysis, setAnalysis] = useState(null);
            const [compareAnalysis, setCompareAnalysis] = useState({ before: null, after: null });
            const [loading, setLoading] = useState(false);
            const [selectedPreset, setSelectedPreset] = useState('healthcare');
            const [customCriteria, setCustomCriteria] = useState(null);
            const [guidelinesCriteria, setGuidelinesCriteria] = useState(null);
            const [showTutorial, setShowTutorial] = useState(true);
            const fileInputRef = useRef(null);

            const brandPresets = {
                healthcare: {
                    name: "Healthcare (Clear, Helpful, Human)",
                    description: "Healthcare brand voice - like Alan",
                    criteria: {
                        clarity: "Clear and concise. Avoids complexity. Easy to understand for everyone.",
                        empathy: "Shows understanding and care. Uses 'you' language. Supportive tone.",
                        jargon: "Minimal jargon. Explains technical terms simply. Accessible to all.",
                        readability: "Scannable with short sentences. Good formatting. Easy to digest."
                    }
                },
                luxury: {
                    name: "Luxury Fashion (Elegant, Aspirational)",
                    description: "Premium fashion brand voice",
                    criteria: {
                        sophistication: "Refined language. Elevated but not pretentious. Tasteful.",
                        aspiration: "Creates desire. Exclusive yet approachable. Inspiring.",
                        aesthetics: "Sensory and visual language. Artful descriptions.",
                        authenticity: "Genuine brand storytelling. Heritage and craft focus."
                    }
                },
                b2b: {
                    name: "B2B SaaS (Professional, Value-Driven)",
                    description: "Professional tech brand voice",
                    criteria: {
                        clarity: "Crystal clear value proposition. Benefit-focused. No fluff.",
                        professionalism: "Confident but not arrogant. Data-driven and credible.",
                        technicality: "Balanced technical depth. Industry terms OK if explained.",
                        action: "Clear call-to-action. Makes next step obvious."
                    }
                },
                hospitality: {
                    name: "Hospitality (Warm, Welcoming)",
                    description: "Hotel and travel brand voice",
                    criteria: {
                        warmth: "Friendly and inviting. Makes people feel welcome.",
                        experience: "Focuses on feelings and moments. Experiential language.",
                        service: "Attentive and caring. Guest-centric approach.",
                        discovery: "Sense of adventure. Inspiring exploration."
                    }
                }
            };

            const sampleContent = {
                healthcare: "We make health insurance simple. Get covered in 5 minutes, access care 24/7, and focus on prevention. Your health matters.",
                luxury: "Crafted from the finest Italian leather, each piece tells a story of timeless elegance. Discover the art of refined simplicity.",
                b2b: "Our analytics platform helps teams make data-driven decisions faster. Track performance, identify trends, optimize ROI.",
                hospitality: "Your sanctuary awaits. From sunrise yoga to rooftop stargazing, every moment is designed to restore and inspire.",
                social: "Prevention > reaction 🌱 Small daily choices = big health wins. What's your wellness habit? 👇"
            };

            const handleFileUpload = async (event) => {
                const file = event.target.files[0];
                if (!file) return;

                setLoading(true);
                const reader = new FileReader();

                reader.onload = async (e) => {
                    try {
                        let extractedText = '';

                        if (file.type === 'text/plain') {
                            extractedText = e.target.result;
                        } else if (file.type === 'application/pdf') {
                            alert('PDF support: For best results, copy/paste text from your PDF into the "Train" mode instead. This ensures accurate text extraction.');
                            setLoading(false);
                            return;
                        } else {
                            extractedText = e.target.result;
                        }

                        const response = await fetch('/api/analyze', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                model: 'claude-sonnet-4-20250514',
                                max_tokens: 1500,
                                messages: [{
                                    role: 'user',
                                    content: `You are analyzing brand guidelines/language book. Extract the 4 most important brand voice criteria from this document:\n\n${extractedText.substring(0, 4000)}\n\nRespond ONLY with JSON (no markdown):\n{\n  "brand_name": "Name if mentioned",\n  "criterion1_name": "Description from the document",\n  "criterion2_name": "Description from the document",\n  "criterion3_name": "Description from the document",\n  "criterion4_name": "Description from the document"\n}`
                                }]
                            })
                        });

                        const data = await response.json();
                        const cleanJson = data.content[0].text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                        const extracted = JSON.parse(cleanJson);

                        const { brand_name, ...criteria } = extracted;
                        setGuidelinesCriteria(criteria);
                        setUploadedGuidelines({
                            fileName: file.name,
                            brandName: brand_name || 'Your Brand',
                            criteria: criteria
                        });
                        setSelectedPreset('guidelines');

                        alert(`Guidelines loaded — found criteria for ${brand_name || 'your brand'}. Switch to "Analyze" to test content.`);
                    } catch (error) {
                        alert('Error processing file. Try copying text and using "Train" mode instead.');
                    } finally {
                        setLoading(false);
                    }
                };

                reader.readAsText(file);
            };

            const analyzeContent = async (textToAnalyze, criteriaToUse = null) => {
                if (!textToAnalyze.trim()) {
                    alert('Please enter some content to analyze');
                    return null;
                }

                let currentCriteria;
                if (selectedPreset === 'guidelines' && guidelinesCriteria) {
                    currentCriteria = guidelinesCriteria;
                } else if (selectedPreset === 'custom' && customCriteria) {
                    currentCriteria = customCriteria;
                } else {
                    currentCriteria = brandPresets[selectedPreset].criteria;
                }

                const criteriaList = Object.entries(currentCriteria)
                    .map(([key, description], i) => `${i + 1}. ${key.toUpperCase().replace(/_/g, ' ')} (0-100): ${description}`)
                    .join('\n');

                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'claude-sonnet-4-20250514',
                            max_tokens: 1500,
                            messages: [{
                                role: 'user',
                                content: `Analyze this content against these brand voice criteria:\n\n${criteriaList}\n\nContent:\n"""\n${textToAnalyze}\n"""\n\nRespond ONLY with JSON (no markdown):\n{\n  "${Object.keys(currentCriteria)[0]}": { "score": 85, "feedback": "Specific actionable feedback" },\n  "${Object.keys(currentCriteria)[1]}": { "score": 70, "feedback": "Specific actionable feedback" },\n  "${Object.keys(currentCriteria)[2]}": { "score": 80, "feedback": "Specific actionable feedback" },\n  "${Object.keys(currentCriteria)[3]}": { "score": 75, "feedback": "Specific actionable feedback" },\n  "overall": { "score": 77, "summary": "One sentence overall assessment" }\n}`
                            }]
                        })
                    });

                    const data = await response.json();
                    const cleanJson = data.content[0].text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                    return JSON.parse(cleanJson);
                } catch (error) {
                    console.error('Analysis error:', error);
                    return null;
                }
            };

            const handleAnalyze = async () => {
                setLoading(true);
                const result = await analyzeContent(content);
                setAnalysis(result);
                setLoading(false);
            };

            const handleCompare = async () => {
                setLoading(true);
                const beforeResult = await analyzeContent(beforeContent);
                const afterResult = await analyzeContent(afterContent);
                setCompareAnalysis({ before: beforeResult, after: afterResult });
                setLoading(false);
            };

            const handleTrain = async () => {
                const validExamples = trainingExamples.filter(ex => ex.trim().length > 0);
                if (validExamples.length < 2) {
                    alert('Please provide at least 2 content examples to train on');
                    return;
                }

                setLoading(true);
                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'claude-sonnet-4-20250514',
                            max_tokens: 1000,
                            messages: [{
                                role: 'user',
                                content: `Analyze these ${validExamples.length} content examples and identify the 4 key brand voice characteristics:\n\n${validExamples.map((ex, i) => `Example ${i + 1}:\n${ex}`).join('\n\n')}\n\nRespond ONLY with JSON (no markdown):\n{\n  "characteristic_1": "Clear description of this voice element",\n  "characteristic_2": "Clear description",\n  "characteristic_3": "Clear description",\n  "characteristic_4": "Clear description"\n}`
                            }]
                        })
                    });

                    const data = await response.json();
                    const cleanJson = data.content[0].text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                    const learnedCriteria = JSON.parse(cleanJson);
                    setCustomCriteria(learnedCriteria);
                    setSelectedPreset('custom');
                    alert('Brand voice learned. Switch to "Analyze" to test content.');
                } catch (error) {
                    alert('Error training. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            const ScoreCard = ({ label, score, feedback, showImprovement = null }) => {
                const scoreColor = score >= 80 ? '#7A9E87' : score >= 60 ? '#b08d5a' : '#C4503A';
                const improvColor = showImprovement > 0 ? '#7A9E87' : showImprovement < 0 ? '#C4503A' : '#2C2C2C';

                return (
                    <div className="score-divider" style={{marginBottom: '1.25rem'}}>
                        <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '8px'}}>
                            <span style={{fontWeight: '500', color: '#2C2C2C', textTransform: 'capitalize', fontSize: '0.9375rem'}}>
                                {label.replace(/_/g, ' ')}
                            </span>
                            <div style={{display: 'flex', alignItems: 'center', gap: '8px'}}>
                                <span style={{fontSize: '1.5rem', fontWeight: '700', color: scoreColor, fontFamily: '"Playfair Display", serif'}}>{score}</span>
                                {showImprovement !== null && (
                                    <span style={{fontSize: '0.8125rem', fontWeight: '600', color: improvColor}}>
                                        {showImprovement > 0 ? '+' : ''}{showImprovement}
                                    </span>
                                )}
                            </div>
                        </div>
                        <div style={{width: '100%', backgroundColor: '#EDE8DE', borderRadius: '9999px', height: '5px', marginBottom: '8px'}}>
                            <div style={{width: `${score}%`, height: '5px', borderRadius: '9999px', backgroundColor: scoreColor, transition: 'width 0.6s ease'}}></div>
                        </div>
                        <p style={{fontSize: '0.875rem', color: '#6B6B6B', lineHeight: '1.5'}}>{feedback}</p>
                    </div>
                );
            };

            const getCurrentCriteria = () => {
                if (selectedPreset === 'guidelines' && guidelinesCriteria) return guidelinesCriteria;
                if (selectedPreset === 'custom' && customCriteria) return customCriteria;
                return brandPresets[selectedPreset]?.criteria || {};
            };

            return (
                <div style={{minHeight: '100vh', backgroundColor: '#F5F0E8', padding: '32px 16px 64px'}}>
                    <div style={{maxWidth: '1100px', margin: '0 auto'}}>

                        {/* Header */}
                        <div style={{textAlign: 'center', marginBottom: '48px'}}>
                            <p style={{fontSize: '0.75rem', fontWeight: '600', letterSpacing: '0.12em', textTransform: 'uppercase', color: '#7A9E87', marginBottom: '10px'}}>
                                BrandieBuilds
                            </p>
                            <h1 style={{fontFamily: '"Playfair Display", Georgia, serif', fontSize: 'clamp(2rem, 5vw, 3rem)', fontWeight: '700', color: '#2C2C2C', lineHeight: '1.15', marginBottom: '12px'}}>
                                Brand Voice Analyzer
                            </h1>
                            <p style={{color: '#6B6B6B', fontSize: '1.0625rem', maxWidth: '460px', margin: '0 auto 6px'}}>
                                Upload your brand guidelines or train on your content
                            </p>
                            <p style={{fontSize: '0.8125rem', color: '#b0a898'}}>
                                Built by Brandie Raasch · Free to use
                            </p>
                        </div>

                        {/* Tutorial Banner */}
                        {showTutorial && (
                            <div style={{backgroundColor: '#EDE8DE', border: '1px solid #D4C5A9', borderRadius: '8px', padding: '20px 24px', marginBottom: '20px'}}>
                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '16px'}}>
                                    <div>
                                        <p style={{fontWeight: '600', color: '#2C2C2C', marginBottom: '10px', fontSize: '0.9375rem'}}>
                                            Three ways to use this tool:
                                        </p>
                                        <ol style={{paddingLeft: '20px', margin: 0}}>
                                            <li style={{fontSize: '0.875rem', color: '#4a4a4a', marginBottom: '6px'}}><strong>Upload Guidelines</strong> — Upload your brand book or language book. AI extracts your criteria.</li>
                                            <li style={{fontSize: '0.875rem', color: '#4a4a4a', marginBottom: '6px'}}><strong>Train on Examples</strong> — Paste 3–5 content samples. AI learns your patterns.</li>
                                            <li style={{fontSize: '0.875rem', color: '#4a4a4a'}}><strong>Use Presets</strong> — Try industry templates: Healthcare, Luxury, B2B, Hospitality.</li>
                                        </ol>
                                    </div>
                                    <button onClick={() => setShowTutorial(false)} style={{background: 'none', border: 'none', cursor: 'pointer', color: '#b0a898', fontSize: '1.125rem', lineHeight: 1, flexShrink: 0, padding: '2px 4px'}}>✕</button>
                                </div>
                            </div>
                        )}

                        {/* Upload Guidelines Banner */}
                        <div style={{backgroundColor: '#7A9E87', borderRadius: '8px', padding: '28px 32px', marginBottom: '20px', color: '#FFFFFF'}}>
                            <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '24px', flexWrap: 'wrap'}}>
                                <div>
                                    <h2 style={{fontFamily: '"Playfair Display", serif', fontSize: '1.375rem', fontWeight: '700', marginBottom: '6px'}}>
                                        Upload Your Brand Guidelines
                                    </h2>
                                    <p style={{fontSize: '0.9375rem', opacity: 0.88, marginBottom: '4px'}}>Upload your Language Book, Brand Guidelines, or Tone of Voice document</p>
                                    <p style={{fontSize: '0.8125rem', opacity: 0.7}}>Supports: TXT files · PDF: copy/paste text into "Train" mode</p>
                                </div>
                                <div style={{flexShrink: 0}}>
                                    <input ref={fileInputRef} type="file" accept=".txt,.pdf,.doc,.docx" onChange={handleFileUpload} style={{display: 'none'}} />
                                    <button
                                        onClick={() => fileInputRef.current.click()}
                                        disabled={loading}
                                        style={{backgroundColor: '#FFFFFF', color: '#5f836e', border: 'none', padding: '12px 24px', borderRadius: '6px', fontWeight: '600', fontSize: '0.9375rem', cursor: loading ? 'not-allowed' : 'pointer', opacity: loading ? 0.7 : 1, fontFamily: '"DM Sans", sans-serif', transition: 'opacity 0.15s'}}
                                    >
                                        {loading ? 'Processing…' : 'Upload Guidelines'}
                                    </button>
                                </div>
                            </div>
                            {uploadedGuidelines && (
                                <div style={{marginTop: '16px', padding: '14px 18px', backgroundColor: 'rgba(255,255,255,0.18)', borderRadius: '6px'}}>
                                    <p style={{fontWeight: '600', fontSize: '0.9375rem'}}>Loaded: {uploadedGuidelines.fileName}</p>
                                    <p style={{fontSize: '0.8125rem', opacity: 0.85}}>Brand: {uploadedGuidelines.brandName}</p>
                                </div>
                            )}
                        </div>

                        {/* Mode Tabs */}
                        <div style={{backgroundColor: '#EDE8DE', borderRadius: '8px', padding: '5px', marginBottom: '24px', display: 'flex', gap: '4px'}}>
                            {[
                                {id: 'analyze', label: 'Analyze Content'},
                                {id: 'train', label: 'Train on Examples'},
                                {id: 'compare', label: 'Before / After'},
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setMode(tab.id)}
                                    style={{
                                        flex: 1,
                                        padding: '11px 16px',
                                        borderRadius: '5px',
                                        fontWeight: '500',
                                        fontSize: '0.9rem',
                                        border: 'none',
                                        cursor: 'pointer',
                                        fontFamily: '"DM Sans", sans-serif',
                                        transition: 'all 0.15s ease',
                                        backgroundColor: mode === tab.id ? '#2C2C2C' : 'transparent',
                                        color: mode === tab.id ? '#F5F0E8' : '#2C2C2C',
                                    }}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </div>

                        {/* ── ANALYZE MODE ── */}
                        {mode === 'analyze' && (
                            <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '20px', alignItems: 'start'}}>

                                {/* Left column */}
                                <div style={{display: 'flex', flexDirection: 'column', gap: '16px'}}>

                                    {/* Voice Source */}
                                    <div className="bb-card" style={{padding: '24px'}}>
                                        <h3 style={{fontFamily: '"Playfair Display", serif', fontWeight: '700', fontSize: '1.0625rem', color: '#2C2C2C', marginBottom: '14px'}}>
                                            Brand Voice Source
                                        </h3>
                                        <select
                                            value={selectedPreset}
                                            onChange={(e) => setSelectedPreset(e.target.value)}
                                            className="bb-input"
                                            style={{marginBottom: '16px', cursor: 'pointer'}}
                                        >
                                            {uploadedGuidelines && (
                                                <option value="guidelines">{uploadedGuidelines.brandName} (Uploaded)</option>
                                            )}
                                            {customCriteria && (
                                                <option value="custom">Your Trained Voice</option>
                                            )}
                                            {Object.entries(brandPresets).map(([key, preset]) => (
                                                <option key={key} value={key}>{preset.name}</option>
                                            ))}
                                        </select>

                                        <div style={{backgroundColor: '#F5F0E8', borderRadius: '6px', padding: '14px'}}>
                                            <p style={{fontWeight: '600', fontSize: '0.8125rem', color: '#2C2C2C', marginBottom: '10px', textTransform: 'uppercase', letterSpacing: '0.06em'}}>
                                                {uploadedGuidelines && selectedPreset === 'guidelines' ? `${uploadedGuidelines.brandName} Voice` : 'Analyzing for'}
                                            </p>
                                            {Object.entries(getCurrentCriteria()).map(([key, desc]) => (
                                                <div key={key} className="criteria-item">
                                                    <span style={{fontWeight: '500', textTransform: 'capitalize', color: '#2C2C2C', fontSize: '0.875rem'}}>{key.replace(/_/g, ' ')}</span>
                                                    <p style={{color: '#6B6B6B', fontSize: '0.8125rem', marginTop: '2px', lineHeight: '1.4'}}>{desc}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Sample Content */}
                                    <div className="bb-card" style={{padding: '24px'}}>
                                        <h3 style={{fontFamily: '"Playfair Display", serif', fontWeight: '700', fontSize: '1.0625rem', color: '#2C2C2C', marginBottom: '14px'}}>
                                            Try Sample Content
                                        </h3>
                                        {Object.entries(sampleContent).map(([key, text]) => (
                                            <button key={key} onClick={() => setContent(text)} className="sample-btn">
                                                {key.charAt(0).toUpperCase() + key.slice(1)}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Right column */}
                                <div style={{display: 'flex', flexDirection: 'column', gap: '20px', gridColumn: 'span 2'}}>
                                    <div className="bb-card" style={{padding: '24px'}}>
                                        <label style={{display: 'block', fontWeight: '500', color: '#2C2C2C', marginBottom: '10px', fontSize: '0.9375rem'}}>
                                            Your Content
                                        </label>
                                        <textarea
                                            value={content}
                                            onChange={(e) => setContent(e.target.value)}
                                            placeholder="Paste a blog post, social caption, email, product description, or website copy…"
                                            className="bb-input"
                                            style={{height: '160px', display: 'block'}}
                                        />
                                        <button
                                            onClick={handleAnalyze}
                                            disabled={loading}
                                            className="bb-btn-primary"
                                            style={{marginTop: '14px', width: '100%', padding: '14px', borderRadius: '6px', fontWeight: '600', fontSize: '1rem'}}
                                        >
                                            {loading ? <span>Analyzing<span className="loading-dot">…</span></span> : 'Analyze Brand Voice'}
                                        </button>
                                    </div>

                                    {analysis && (
                                        <div className="bb-card" style={{padding: '28px'}}>
                                            {/* Overall Score */}
                                            <div style={{backgroundColor: '#2C2C2C', borderRadius: '8px', padding: '24px', marginBottom: '28px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '16px'}}>
                                                <div>
                                                    <p style={{fontSize: '0.75rem', fontWeight: '600', letterSpacing: '0.1em', textTransform: 'uppercase', color: '#7A9E87', marginBottom: '4px'}}>Overall Score</p>
                                                    <p style={{color: '#D4C5A9', fontSize: '0.9375rem', lineHeight: '1.5'}}>{analysis.overall.summary}</p>
                                                </div>
                                                <div style={{fontFamily: '"Playfair Display", serif', fontSize: '3.5rem', fontWeight: '700', color: '#F5F0E8', lineHeight: 1}}>{analysis.overall.score}</div>
                                            </div>

                                            <div style={{display: 'flex', flexDirection: 'column', gap: '0'}}>
                                                {Object.keys(getCurrentCriteria()).map((key) =>
                                                    analysis[key] && <ScoreCard key={key} label={key} {...analysis[key]} />
                                                )}
                                            </div>
                                            <button
                                                onClick={() => setAnalysis(null)}
                                                className="bb-btn-ghost"
                                                style={{marginTop: '20px', width: '100%', padding: '12px', borderRadius: '6px', fontWeight: '500', fontSize: '0.9375rem'}}
                                            >
                                                Analyze New Content
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ── TRAIN MODE ── */}
                        {mode === 'train' && (
                            <div style={{maxWidth: '720px', margin: '0 auto'}}>
                                <div className="bb-card" style={{padding: '32px'}}>
                                    <div style={{marginBottom: '28px'}}>
                                        <h2 style={{fontFamily: '"Playfair Display", serif', fontSize: '1.5rem', fontWeight: '700', color: '#2C2C2C', marginBottom: '8px'}}>
                                            Train AI on Your Brand Voice
                                        </h2>
                                        <p style={{color: '#6B6B6B', fontSize: '0.9375rem', lineHeight: '1.6'}}>
                                            Paste 3–5 examples of your best content. The AI will learn your patterns and create custom criteria.
                                        </p>
                                        <p style={{fontSize: '0.875rem', color: '#7A9E87', marginTop: '8px', fontWeight: '500'}}>
                                            Tip: If you have PDFs, copy/paste the text here instead of uploading.
                                        </p>
                                    </div>

                                    {trainingExamples.map((example, i) => (
                                        <div key={i} style={{marginBottom: '18px'}}>
                                            <label style={{display: 'block', fontWeight: '500', color: '#2C2C2C', marginBottom: '8px', fontSize: '0.9375rem'}}>
                                                Example {i + 1} {i < 2 && <span style={{color: '#C4503A'}}>*</span>}
                                            </label>
                                            <textarea
                                                value={example}
                                                onChange={(e) => {
                                                    const newExamples = [...trainingExamples];
                                                    newExamples[i] = e.target.value;
                                                    setTrainingExamples(newExamples);
                                                }}
                                                placeholder={`Paste example ${i + 1}…`}
                                                className="bb-input"
                                                style={{height: '96px'}}
                                            />
                                        </div>
                                    ))}

                                    <button
                                        onClick={handleTrain}
                                        disabled={loading}
                                        className="bb-btn-primary"
                                        style={{width: '100%', padding: '15px', borderRadius: '6px', fontWeight: '600', fontSize: '1rem'}}
                                    >
                                        {loading ? <span>Learning Your Voice<span className="loading-dot">…</span></span> : 'Train AI on My Brand Voice'}
                                    </button>

                                    {customCriteria && (
                                        <div style={{marginTop: '20px', padding: '18px 20px', backgroundColor: '#F5F0E8', border: '1px solid #7A9E87', borderRadius: '6px'}}>
                                            <p style={{fontWeight: '600', color: '#2C2C2C', marginBottom: '4px', fontSize: '0.9375rem'}}>Your brand voice has been learned.</p>
                                            <p style={{fontSize: '0.875rem', color: '#6B6B6B'}}>Switch to "Analyze Content" to test new content against your custom voice.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ── COMPARE MODE ── */}
                        {mode === 'compare' && (
                            <div>
                                <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '20px', marginBottom: '20px'}}>

                                    {/* Before */}
                                    <div style={{display: 'flex', flexDirection: 'column', gap: '16px'}}>
                                        <div className="bb-card" style={{padding: '24px'}}>
                                            <h3 style={{fontWeight: '600', color: '#C4503A', marginBottom: '14px', fontSize: '1rem', letterSpacing: '0.04em', textTransform: 'uppercase', fontSize: '0.8125rem'}}>
                                                Before · Original
                                            </h3>
                                            <textarea
                                                value={beforeContent}
                                                onChange={(e) => setBeforeContent(e.target.value)}
                                                placeholder="Paste your original content…"
                                                className="bb-input"
                                                style={{height: '220px'}}
                                            />
                                        </div>
                                        {compareAnalysis.before && (
                                            <div className="bb-card" style={{padding: '24px'}}>
                                                <h3 style={{fontFamily: '"Playfair Display", serif', fontWeight: '700', fontSize: '1.0625rem', color: '#2C2C2C', marginBottom: '18px'}}>Before Scores</h3>
                                                <div>
                                                    {Object.keys(getCurrentCriteria()).map((key) =>
                                                        compareAnalysis.before[key] && <ScoreCard key={key} label={key} {...compareAnalysis.before[key]} />
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* After */}
                                    <div style={{display: 'flex', flexDirection: 'column', gap: '16px'}}>
                                        <div className="bb-card" style={{padding: '24px'}}>
                                            <h3 style={{fontWeight: '600', color: '#7A9E87', marginBottom: '14px', fontSize: '0.8125rem', letterSpacing: '0.04em', textTransform: 'uppercase'}}>
                                                After · Improved
                                            </h3>
                                            <textarea
                                                value={afterContent}
                                                onChange={(e) => setAfterContent(e.target.value)}
                                                placeholder="Paste your improved content…"
                                                className="bb-input"
                                                style={{height: '220px'}}
                                            />
                                        </div>
                                        {compareAnalysis.after && (
                                            <div className="bb-card" style={{padding: '24px'}}>
                                                <h3 style={{fontFamily: '"Playfair Display", serif', fontWeight: '700', fontSize: '1.0625rem', color: '#2C2C2C', marginBottom: '18px'}}>After Scores</h3>
                                                <div>
                                                    {Object.keys(getCurrentCriteria()).map((key) =>
                                                        compareAnalysis.after[key] && (
                                                            <ScoreCard
                                                                key={key}
                                                                label={key}
                                                                {...compareAnalysis.after[key]}
                                                                showImprovement={compareAnalysis.after[key].score - compareAnalysis.before[key].score}
                                                            />
                                                        )
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <button
                                    onClick={handleCompare}
                                    disabled={loading}
                                    className="bb-btn-rust"
                                    style={{width: '100%', padding: '15px', borderRadius: '6px', fontWeight: '600', fontSize: '1rem'}}
                                >
                                    {loading ? <span>Comparing<span className="loading-dot">…</span></span> : 'Compare Before vs After'}
                                </button>
                            </div>
                        )}

                        {/* Footer */}
                        <div className="bb-card" style={{marginTop: '32px', padding: '28px 32px'}}>
                            <h3 style={{fontFamily: '"Playfair Display", serif', fontWeight: '700', fontSize: '1.125rem', color: '#2C2C2C', marginBottom: '18px'}}>
                                How This Tool Works
                            </h3>
                            <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '20px'}}>
                                <div>
                                    <p style={{fontWeight: '600', color: '#2C2C2C', marginBottom: '6px', fontSize: '0.9375rem'}}>Upload Guidelines</p>
                                    <p style={{fontSize: '0.8125rem', color: '#6B6B6B', lineHeight: '1.55'}}>Upload your Language Book or Brand Guidelines. AI extracts your specific voice criteria.</p>
                                </div>
                                <div>
                                    <p style={{fontWeight: '600', color: '#2C2C2C', marginBottom: '6px', fontSize: '0.9375rem'}}>Train on Content</p>
                                    <p style={{fontSize: '0.8125rem', color: '#6B6B6B', lineHeight: '1.55'}}>Paste 3–5 content examples. AI learns patterns and creates custom criteria.</p>
                                </div>
                                <div>
                                    <p style={{fontWeight: '600', color: '#2C2C2C', marginBottom: '6px', fontSize: '0.9375rem'}}>Analyze Anything</p>
                                    <p style={{fontSize: '0.8125rem', color: '#6B6B6B', lineHeight: '1.55'}}>Test any content against your brand voice. Get scores and actionable feedback.</p>
                                </div>
                            </div>
                            <p style={{marginTop: '24px', fontSize: '0.8125rem', color: '#b0a898', borderTop: '1px solid #EDE8DE', paddingTop: '20px', fontStyle: 'italic', lineHeight: '1.6'}}>
                                Built with React + Claude AI API by Brandie Raasch. Demonstrates AI-powered content systems for scaling brand voice consistency across teams, markets, and platforms. Free to use — share with your team.
                            </p>
                        </div>

                    </div>
                </div>
            );
        }

        ReactDOM.render(<BrandVoiceAnalyzer />, document.getElementById('root'));
    </script>
</body>
</html>
