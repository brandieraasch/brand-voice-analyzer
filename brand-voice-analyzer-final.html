<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Voice Analyzer - Upload Your Guidelines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        function BrandVoiceAnalyzer() {
            const [mode, setMode] = useState('analyze');
            const [content, setContent] = useState('');
            const [beforeContent, setBeforeContent] = useState('');
            const [afterContent, setAfterContent] = useState('');
            const [trainingExamples, setTrainingExamples] = useState(['', '', '']);
            const [uploadedGuidelines, setUploadedGuidelines] = useState(null);
            const [analysis, setAnalysis] = useState(null);
            const [compareAnalysis, setCompareAnalysis] = useState({ before: null, after: null });
            const [loading, setLoading] = useState(false);
            const [selectedPreset, setSelectedPreset] = useState('healthcare');
            const [customCriteria, setCustomCriteria] = useState(null);
            const [guidelinesCriteria, setGuidelinesCriteria] = useState(null);
            const [showTutorial, setShowTutorial] = useState(true);
            const fileInputRef = useRef(null);

            const brandPresets = {
                healthcare: {
                    name: "Healthcare (Clear, Helpful, Human)",
                    description: "Healthcare brand voice - like Alan",
                    criteria: {
                        clarity: "Clear and concise. Avoids complexity. Easy to understand for everyone.",
                        empathy: "Shows understanding and care. Uses 'you' language. Supportive tone.",
                        jargon: "Minimal jargon. Explains technical terms simply. Accessible to all.",
                        readability: "Scannable with short sentences. Good formatting. Easy to digest."
                    }
                },
                luxury: {
                    name: "Luxury Fashion (Elegant, Aspirational)",
                    description: "Premium fashion brand voice",
                    criteria: {
                        sophistication: "Refined language. Elevated but not pretentious. Tasteful.",
                        aspiration: "Creates desire. Exclusive yet approachable. Inspiring.",
                        aesthetics: "Sensory and visual language. Artful descriptions.",
                        authenticity: "Genuine brand storytelling. Heritage and craft focus."
                    }
                },
                b2b: {
                    name: "B2B SaaS (Professional, Value-Driven)",
                    description: "Professional tech brand voice",
                    criteria: {
                        clarity: "Crystal clear value proposition. Benefit-focused. No fluff.",
                        professionalism: "Confident but not arrogant. Data-driven and credible.",
                        technicality: "Balanced technical depth. Industry terms OK if explained.",
                        action: "Clear call-to-action. Makes next step obvious."
                    }
                },
                hospitality: {
                    name: "Hospitality (Warm, Welcoming)",
                    description: "Hotel and travel brand voice",
                    criteria: {
                        warmth: "Friendly and inviting. Makes people feel welcome.",
                        experience: "Focuses on feelings and moments. Experiential language.",
                        service: "Attentive and caring. Guest-centric approach.",
                        discovery: "Sense of adventure. Inspiring exploration."
                    }
                }
            };

            const sampleContent = {
                healthcare: "We make health insurance simple. Get covered in 5 minutes, access care 24/7, and focus on prevention. Your health matters.",
                luxury: "Crafted from the finest Italian leather, each piece tells a story of timeless elegance. Discover the art of refined simplicity.",
                b2b: "Our analytics platform helps teams make data-driven decisions faster. Track performance, identify trends, optimize ROI.",
                hospitality: "Your sanctuary awaits. From sunrise yoga to rooftop stargazing, every moment is designed to restore and inspire.",
                social: "Prevention > reaction 🌱 Small daily choices = big health wins. What's your wellness habit? 👇"
            };

            const handleFileUpload = async (event) => {
                const file = event.target.files[0];
                if (!file) return;

                setLoading(true);
                const reader = new FileReader();

                reader.onload = async (e) => {
                    try {
                        let extractedText = '';
                        
                        if (file.type === 'text/plain') {
                            extractedText = e.target.result;
                        } else if (file.type === 'application/pdf') {
                            // For demo purposes, show instruction
                            alert('PDF support: For best results, copy/paste text from your PDF into the "Train" mode instead. This ensures accurate text extraction.');
                            setLoading(false);
                            return;
                        } else {
                            extractedText = e.target.result;
                        }

                        // Analyze the brand guidelines to extract voice criteria
                        const response = await fetch('https://api.anthropic.com/v1/messages', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                model: 'claude-sonnet-4-20250514',
                                max_tokens: 1500,
                                messages: [{
                                    role: 'user',
                                    content: `You are analyzing brand guidelines/language book. Extract the 4 most important brand voice criteria from this document:\n\n${extractedText.substring(0, 4000)}\n\nRespond ONLY with JSON (no markdown):\n{\n  "brand_name": "Name if mentioned",\n  "criterion1_name": "Description from the document",\n  "criterion2_name": "Description from the document",\n  "criterion3_name": "Description from the document",\n  "criterion4_name": "Description from the document"\n}`
                                }]
                            })
                        });

                        const data = await response.json();
                        const cleanJson = data.content[0].text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                        const extracted = JSON.parse(cleanJson);
                        
                        const { brand_name, ...criteria } = extracted;
                        setGuidelinesCriteria(criteria);
                        setUploadedGuidelines({
                            fileName: file.name,
                            brandName: brand_name || 'Your Brand',
                            criteria: criteria
                        });
                        setSelectedPreset('guidelines');
                        
                        alert(`✅ Brand guidelines loaded! Found criteria for ${brand_name || 'your brand'}. Switch to "Analyze" to test content.`);
                    } catch (error) {
                        alert('Error processing file. Try copying text and using "Train" mode instead.');
                    } finally {
                        setLoading(false);
                    }
                };

                reader.readAsText(file);
            };

            const analyzeContent = async (textToAnalyze, criteriaToUse = null) => {
                if (!textToAnalyze.trim()) {
                    alert('Please enter some content to analyze');
                    return null;
                }

                let currentCriteria;
                if (selectedPreset === 'guidelines' && guidelinesCriteria) {
                    currentCriteria = guidelinesCriteria;
                } else if (selectedPreset === 'custom' && customCriteria) {
                    currentCriteria = customCriteria;
                } else {
                    currentCriteria = brandPresets[selectedPreset].criteria;
                }

                const criteriaList = Object.entries(currentCriteria)
                    .map(([key, description], i) => `${i + 1}. ${key.toUpperCase().replace(/_/g, ' ')} (0-100): ${description}`)
                    .join('\n');

                try {
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'claude-sonnet-4-20250514',
                            max_tokens: 1500,
                            messages: [{
                                role: 'user',
                                content: `Analyze this content against these brand voice criteria:\n\n${criteriaList}\n\nContent:\n"""\n${textToAnalyze}\n"""\n\nRespond ONLY with JSON (no markdown):\n{\n  "${Object.keys(currentCriteria)[0]}": { "score": 85, "feedback": "Specific actionable feedback" },\n  "${Object.keys(currentCriteria)[1]}": { "score": 70, "feedback": "Specific actionable feedback" },\n  "${Object.keys(currentCriteria)[2]}": { "score": 80, "feedback": "Specific actionable feedback" },\n  "${Object.keys(currentCriteria)[3]}": { "score": 75, "feedback": "Specific actionable feedback" },\n  "overall": { "score": 77, "summary": "One sentence overall assessment" }\n}`
                            }]
                        })
                    });

                    const data = await response.json();
                    const cleanJson = data.content[0].text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                    return JSON.parse(cleanJson);
                } catch (error) {
                    console.error('Analysis error:', error);
                    return null;
                }
            };

            const handleAnalyze = async () => {
                setLoading(true);
                const result = await analyzeContent(content);
                setAnalysis(result);
                setLoading(false);
            };

            const handleCompare = async () => {
                setLoading(true);
                const beforeResult = await analyzeContent(beforeContent);
                const afterResult = await analyzeContent(afterContent);
                setCompareAnalysis({ before: beforeResult, after: afterResult });
                setLoading(false);
            };

            const handleTrain = async () => {
                const validExamples = trainingExamples.filter(ex => ex.trim().length > 0);
                if (validExamples.length < 2) {
                    alert('Please provide at least 2 content examples to train on');
                    return;
                }

                setLoading(true);
                try {
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'claude-sonnet-4-20250514',
                            max_tokens: 1000,
                            messages: [{
                                role: 'user',
                                content: `Analyze these ${validExamples.length} content examples and identify the 4 key brand voice characteristics:\n\n${validExamples.map((ex, i) => `Example ${i + 1}:\n${ex}`).join('\n\n')}\n\nRespond ONLY with JSON (no markdown):\n{\n  "characteristic_1": "Clear description of this voice element",\n  "characteristic_2": "Clear description",\n  "characteristic_3": "Clear description",\n  "characteristic_4": "Clear description"\n}`
                            }]
                        })
                    });

                    const data = await response.json();
                    const cleanJson = data.content[0].text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                    const learnedCriteria = JSON.parse(cleanJson);
                    setCustomCriteria(learnedCriteria);
                    setSelectedPreset('custom');
                    alert('✅ Brand voice learned! Switch to "Analyze" to test content.');
                } catch (error) {
                    alert('Error training. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            const ScoreCard = ({ label, score, feedback, showImprovement = null }) => {
                const getColor = (s) => s >= 80 ? 'green' : s >= 60 ? 'yellow' : 'red';
                const color = getColor(score);
                
                return (
                    <div className="border-b border-gray-200 pb-4">
                        <div className="flex items-center justify-between mb-2">
                            <h3 className="font-semibold text-gray-900 capitalize">{label.replace(/_/g, ' ')}</h3>
                            <div className="flex items-center gap-2">
                                <span className={`text-2xl font-bold text-${color}-600`}>{score}</span>
                                {showImprovement !== null && (
                                    <span className={`text-sm font-bold ${showImprovement > 0 ? 'text-green-600' : showImprovement < 0 ? 'text-red-600' : 'text-gray-600'}`}>
                                        {showImprovement > 0 ? '+' : ''}{showImprovement}
                                    </span>
                                )}
                            </div>
                        </div>
                        <div className="w-full bg-gray-200 rounded-full h-2 mb-2">
                            <div className={`h-2 rounded-full bg-${color}-500`} style={{ width: `${score}%` }}></div>
                        </div>
                        <p className="text-sm text-gray-600">{feedback}</p>
                    </div>
                );
            };

            const getCurrentCriteria = () => {
                if (selectedPreset === 'guidelines' && guidelinesCriteria) return guidelinesCriteria;
                if (selectedPreset === 'custom' && customCriteria) return customCriteria;
                return brandPresets[selectedPreset]?.criteria || {};
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <div className="text-center mb-8">
                            <h1 className="text-4xl font-bold text-gray-900 mb-2">Brand Voice Analyzer</h1>
                            <p className="text-gray-600">Upload your brand guidelines or train on your content</p>
                            <p className="text-sm text-gray-500 mt-1">Built by Brandie Raasch | Free to use</p>
                        </div>

                        {/* Tutorial Banner */}
                        {showTutorial && (
                            <div className="bg-blue-50 border-2 border-blue-200 rounded-lg p-6 mb-6">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <h3 className="font-bold text-blue-900 mb-2">👋 Welcome! Three ways to use this tool:</h3>
                                        <ol className="text-sm text-blue-800 space-y-1 list-decimal list-inside">
                                            <li><strong>📄 Upload Guidelines:</strong> Upload your brand book/language book → AI extracts your criteria</li>
                                            <li><strong>🎓 Train on Examples:</strong> Paste 3-5 content samples → AI learns your patterns</li>
                                            <li><strong>📊 Use Presets:</strong> Try industry templates (Healthcare, Luxury, B2B, Hospitality)</li>
                                        </ol>
                                    </div>
                                    <button onClick={() => setShowTutorial(false)} className="text-blue-600 hover:text-blue-800 text-xl">✕</button>
                                </div>
                            </div>
                        )}

                        {/* Upload Guidelines Banner */}
                        <div className="bg-gradient-to-r from-purple-500 to-pink-500 rounded-lg shadow-lg p-6 mb-6 text-white">
                            <div className="flex items-center justify-between">
                                <div>
                                    <h3 className="text-2xl font-bold mb-2">📄 Upload Your Brand Guidelines</h3>
                                    <p className="text-purple-100">Upload your Language Book, Brand Guidelines, or Tone of Voice document</p>
                                    <p className="text-sm text-purple-200 mt-1">Supports: TXT files (PDF: copy/paste text into "Train" mode)</p>
                                </div>
                                <div>
                                    <input
                                        ref={fileInputRef}
                                        type="file"
                                        accept=".txt,.pdf,.doc,.docx"
                                        onChange={handleFileUpload}
                                        className="hidden"
                                    />
                                    <button
                                        onClick={() => fileInputRef.current.click()}
                                        disabled={loading}
                                        className="bg-white text-purple-600 px-6 py-3 rounded-lg font-bold hover:bg-purple-50 disabled:bg-gray-300 transition-colors"
                                    >
                                        {loading ? 'Processing...' : '📤 Upload Guidelines'}
                                    </button>
                                </div>
                            </div>
                            {uploadedGuidelines && (
                                <div className="mt-4 p-4 bg-white bg-opacity-20 rounded-lg">
                                    <p className="font-bold">✅ Loaded: {uploadedGuidelines.fileName}</p>
                                    <p className="text-sm text-purple-100">Brand: {uploadedGuidelines.brandName}</p>
                                </div>
                            )}
                        </div>

                        {/* Mode Tabs */}
                        <div className="bg-white rounded-lg shadow-lg p-2 mb-6 flex gap-2">
                            <button
                                onClick={() => setMode('analyze')}
                                className={`flex-1 py-3 px-4 rounded-lg font-medium transition-colors ${mode === 'analyze' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                            >
                                📊 Analyze Content
                            </button>
                            <button
                                onClick={() => setMode('train')}
                                className={`flex-1 py-3 px-4 rounded-lg font-medium transition-colors ${mode === 'train' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                            >
                                🎓 Train on Examples
                            </button>
                            <button
                                onClick={() => setMode('compare')}
                                className={`flex-1 py-3 px-4 rounded-lg font-medium transition-colors ${mode === 'compare' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                            >
                                🔄 Before/After
                            </button>
                        </div>

                        {/* ANALYZE MODE */}
                        {mode === 'analyze' && (
                            <div className="grid md:grid-cols-3 gap-6">
                                <div className="md:col-span-1 space-y-4">
                                    <div className="bg-white rounded-lg shadow-lg p-6">
                                        <h3 className="font-semibold mb-4">Brand Voice Source</h3>
                                        <select
                                            value={selectedPreset}
                                            onChange={(e) => setSelectedPreset(e.target.value)}
                                            className="w-full p-3 border rounded-lg mb-4 font-medium"
                                        >
                                            {uploadedGuidelines && (
                                                <option value="guidelines">📄 {uploadedGuidelines.brandName} (Uploaded)</option>
                                            )}
                                            {customCriteria && (
                                                <option value="custom">✨ Your Trained Voice</option>
                                            )}
                                            {Object.entries(brandPresets).map(([key, preset]) => (
                                                <option key={key} value={key}>{preset.name}</option>
                                            ))}
                                        </select>
                                        
                                        <div className="bg-gray-50 rounded-lg p-4 space-y-2 text-sm">
                                            <p className="font-semibold text-gray-700 mb-2">
                                                {uploadedGuidelines && selectedPreset === 'guidelines' 
                                                    ? `${uploadedGuidelines.brandName} Voice:` 
                                                    : 'Analyzing for:'}
                                            </p>
                                            {Object.entries(getCurrentCriteria()).map(([key, desc]) => (
                                                <div key={key} className="border-l-4 border-blue-400 pl-3 py-1">
                                                    <span className="font-medium capitalize text-gray-900">{key.replace(/_/g, ' ')}:</span>
                                                    <p className="text-gray-600 text-xs mt-1">{desc}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-lg shadow-lg p-6">
                                        <h3 className="font-semibold mb-4">Try Sample Content</h3>
                                        {Object.entries(sampleContent).map(([key, text]) => (
                                            <button
                                                key={key}
                                                onClick={() => setContent(text)}
                                                className="w-full text-left px-3 py-2 mb-2 bg-gray-50 hover:bg-blue-50 rounded text-sm transition-colors"
                                            >
                                                {key.charAt(0).toUpperCase() + key.slice(1)}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="md:col-span-2 space-y-6">
                                    <div className="bg-white rounded-lg shadow-lg p-6">
                                        <label className="block font-medium mb-2">Your Content:</label>
                                        <textarea
                                            value={content}
                                            onChange={(e) => setContent(e.target.value)}
                                            placeholder="Paste: blog post, social caption, email, product description, website copy..."
                                            className="w-full h-40 p-4 border rounded-lg resize-none focus:ring-2 focus:ring-blue-500"
                                        />
                                        <button
                                            onClick={handleAnalyze}
                                            disabled={loading}
                                            className="mt-4 w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 disabled:bg-gray-400 transition-colors text-lg"
                                        >
                                            {loading ? 'Analyzing...' : '🎯 Analyze Brand Voice'}
                                        </button>
                                    </div>

                                    {analysis && (
                                        <div className="bg-white rounded-lg shadow-lg p-6">
                                            <div className="mb-6 p-6 bg-gradient-to-r from-blue-500 to-indigo-600 rounded-lg text-white">
                                                <div className="flex justify-between items-center">
                                                    <div>
                                                        <h2 className="text-2xl font-bold mb-1">Overall Score</h2>
                                                        <p className="text-blue-100">{analysis.overall.summary}</p>
                                                    </div>
                                                    <div className="text-5xl font-bold">{analysis.overall.score}</div>
                                                </div>
                                            </div>
                                            <div className="space-y-6">
                                                {Object.keys(getCurrentCriteria()).map((key) => 
                                                    analysis[key] && <ScoreCard key={key} label={key} {...analysis[key]} />
                                                )}
                                            </div>
                                            <button
                                                onClick={() => setAnalysis(null)}
                                                className="mt-6 w-full bg-gray-100 text-gray-700 py-3 rounded-lg font-medium hover:bg-gray-200"
                                            >
                                                ↻ Analyze New Content
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* TRAIN MODE */}
                        {mode === 'train' && (
                            <div className="max-w-4xl mx-auto">
                                <div className="bg-white rounded-lg shadow-lg p-6">
                                    <div className="mb-6">
                                        <h2 className="text-2xl font-bold mb-2">🎓 Train AI on Your Brand Voice</h2>
                                        <p className="text-gray-600">Paste 3-5 examples of your best content. The AI will learn your patterns and create custom criteria.</p>
                                        <p className="text-sm text-blue-600 mt-2">💡 Tip: If you have PDFs, copy/paste the text here instead of uploading</p>
                                    </div>
                                    
                                    {trainingExamples.map((example, i) => (
                                        <div key={i} className="mb-4">
                                            <label className="block font-medium mb-2">Example {i + 1} {i < 2 && <span className="text-red-500">*</span>}:</label>
                                            <textarea
                                                value={example}
                                                onChange={(e) => {
                                                    const newExamples = [...trainingExamples];
                                                    newExamples[i] = e.target.value;
                                                    setTrainingExamples(newExamples);
                                                }}
                                                placeholder={`Paste example ${i + 1}...`}
                                                className="w-full h-24 p-4 border rounded-lg resize-none focus:ring-2 focus:ring-blue-500"
                                            />
                                        </div>
                                    ))}

                                    <button
                                        onClick={handleTrain}
                                        disabled={loading}
                                        className="w-full bg-green-600 text-white py-4 rounded-lg font-medium hover:bg-green-700 disabled:bg-gray-400 text-lg"
                                    >
                                        {loading ? 'Learning Your Voice...' : '🎓 Train AI on My Brand Voice'}
                                    </button>

                                    {customCriteria && (
                                        <div className="mt-6 p-4 bg-green-50 border-2 border-green-200 rounded-lg">
                                            <p className="font-bold text-green-900 mb-2">✅ Your brand voice has been learned!</p>
                                            <p className="text-sm text-green-800">Switch to "Analyze" tab to test new content against your custom voice.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* COMPARE MODE */}
                        {mode === 'compare' && (
                            <div className="grid md:grid-cols-2 gap-6">
                                <div className="space-y-6">
                                    <div className="bg-white rounded-lg shadow-lg p-6">
                                        <h3 className="font-bold text-red-600 mb-4 text-lg">❌ BEFORE (Original)</h3>
                                        <textarea
                                            value={beforeContent}
                                            onChange={(e) => setBeforeContent(e.target.value)}
                                            placeholder="Paste your original content..."
                                            className="w-full h-64 p-4 border rounded-lg resize-none focus:ring-2 focus:ring-red-500"
                                        />
                                    </div>
                                    {compareAnalysis.before && (
                                        <div className="bg-white rounded-lg shadow-lg p-6">
                                            <h3 className="font-bold mb-4">Before Scores</h3>
                                            <div className="space-y-4">
                                                {Object.keys(getCurrentCriteria()).map((key) =>
                                                    compareAnalysis.before[key] && <ScoreCard key={key} label={key} {...compareAnalysis.before[key]} />
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="space-y-6">
                                    <div className="bg-white rounded-lg shadow-lg p-6">
                                        <h3 className="font-bold text-green-600 mb-4 text-lg">✅ AFTER (Improved)</h3>
                                        <textarea
                                            value={afterContent}
                                            onChange={(e) => setAfterContent(e.target.value)}
                                            placeholder="Paste your improved content..."
                                            className="w-full h-64 p-4 border rounded-lg resize-none focus:ring-2 focus:ring-green-500"
                                        />
                                    </div>
                                    {compareAnalysis.after && (
                                        <div className="bg-white rounded-lg shadow-lg p-6">
                                            <h3 className="font-bold mb-4">After Scores (Improvements in green)</h3>
                                            <div className="space-y-4">
                                                {Object.keys(getCurrentCriteria()).map((key) =>
                                                    compareAnalysis.after[key] && (
                                                        <ScoreCard 
                                                            key={key} 
                                                            label={key} 
                                                            {...compareAnalysis.after[key]}
                                                            showImprovement={compareAnalysis.after[key].score - compareAnalysis.before[key].score}
                                                        />
                                                    )
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="md:col-span-2">
                                    <button
                                        onClick={handleCompare}
                                        disabled={loading}
                                        className="w-full bg-purple-600 text-white py-4 rounded-lg font-medium text-lg hover:bg-purple-700 disabled:bg-gray-400"
                                    >
                                        {loading ? 'Comparing...' : '🔄 Compare Before vs After'}
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Footer */}
                        <div className="mt-8 bg-white rounded-lg shadow-lg p-6 text-sm text-gray-600">
                            <h3 className="font-bold text-gray-900 mb-3">How This Tool Works</h3>
                            <div className="grid md:grid-cols-3 gap-4">
                                <div>
                                    <p className="font-medium text-gray-900 mb-1">📄 Upload Guidelines</p>
                                    <p className="text-xs">Upload your Language Book or Brand Guidelines. AI extracts your specific voice criteria.</p>
                                </div>
                                <div>
